name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install --yes shellcheck

      - name: Check shell scripts
        run: shellcheck entrypoint.sh verify-proxy.sh tests/*.sh

      - name: Validate Compose configuration
        env:
          LDAP_PROXY_IMAGE: jc-ldap-proxy:test
          LDAP_PROXY_UID: "12345"
          LDAP_PROXY_GID: "12346"
          JC_ORG_ID: testorg
          JC_CACHE_READER_UID: qts-reader
        run: docker compose config --quiet

      - name: Build image
        run: docker build --tag jc-ldap-proxy:test --file Dockerfile.ldap-proxy .

      - name: Run configuration and ACL tests
        run: tests/test-container.sh jc-ldap-proxy:test

  docker:
    runs-on: ${{ matrix.runner }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
          flavor: suffix=-${{ matrix.arch }}
          labels: |
            org.opencontainers.image.description=JumpCloud LDAP caching proxy for QNAP.

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.ldap-proxy
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Preserve HEALTHCHECK in Docker v2 image config for Podman/Quadlet.
          provenance: false
          sbom: false
          outputs: ${{ github.event_name != 'pull_request' && 'type=registry,oci-mediatypes=false' || 'type=image,oci-mediatypes=false' }}
          annotations: |
            manifest:org.opencontainers.image.description=JumpCloud LDAP caching proxy for QNAP.

  docker-merge:
    runs-on: ubuntu-24.04
    needs: docker
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create and push multi-arch manifest
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
        run: |
          set -euo pipefail
          jq -cr '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON" | while read -r tag; do
            repo="${tag%%:*}"
            name="${tag##*:}"
            docker buildx imagetools create \
              --annotation "index:org.opencontainers.image.description=JumpCloud LDAP caching proxy for QNAP." \
              -t "$tag" \
              "${repo}:${name}-amd64" \
              "${repo}:${name}-arm64"
          done
