# JumpCloud LDAP caching proxy — QNAP Container Station (Docker) deployment.
#
# QTS integration requires BOTH published ports, loopback-bound so nothing
# on the LAN can reach the proxy:
#   636 (LDAPS)          — what the QTS Domain Security panel connects to
#                          (set server 127.0.0.1, port 636, LDAPS there)
#   389 (LDAP+STARTTLS)  — what QTS's generated backend configs (Samba
#                          ldapsam, nss LDAP) use regardless of the panel
#                          setting; these components feed the Domain
#                          Users/Groups tables
# If QTS must dial a non-loopback address instead, publish both ports on
# the NAS LAN IP and rely on the slapd peername ACL / host firewall.

name: jc-ldap-proxy

services:
  jc-ldap-proxy:
    # Pin production to an immutable release tag or manifest digest.
    # Example: registry.example/ldap-proxy@sha256:<64 hex characters>
    image: ${LDAP_PROXY_IMAGE:?Set LDAP_PROXY_IMAGE to an immutable tag or digest in .env}
    # To build locally on the QNAP instead, uncomment:
    #build:
    #  context: .
    #  dockerfile: Dockerfile.ldap-proxy
    container_name: jc-ldap-proxy
    # QNAP's httpdusr:everyone is 99:100. Override both values in .env when
    # the certificate files or host policy use a different numeric identity.
    user: "${LDAP_PROXY_UID:-99}:${LDAP_PROXY_GID:-100}"
    environment:
      # Interpolated from the .env file next to this compose file
      JC_ORG_ID: ${JC_ORG_ID:?Set JC_ORG_ID in .env}
      # Exact JumpCloud UID used by QTS for its LDAP bind. Cached password
      # and hash attributes are readable only by this identity.
      JC_CACHE_READER_UID: ${JC_CACHE_READER_UID:?Set JC_CACHE_READER_UID in .env}
      # 'stats' logs every search (for pcache template tuning);
      # switch to 'none' afterwards and `docker compose up -d` again.
      SLAPD_LOGLEVEL: ${SLAPD_LOGLEVEL:-stats}
      # Optional: extra allowed client (IP or ip%netmask) for the case where
      # the proxy serves a consumer on ANOTHER host. Unset = loopback no-op,
      # correct for the QNAP-local deployment.
      ALLOWED_CLIENT_IP: ${ALLOWED_CLIENT_IP:-127.0.0.1}
    ports:
      - "127.0.0.1:636:636"
      - "127.0.0.1:389:389"
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    pids_limit: 128
    mem_limit: 512m
    volumes:
      # Server cert/key for TLS (LDAPS on 636, STARTTLS on 389). The QTS
      # panel validates the cert, so the SAN must cover what it dials
      # (IP:127.0.0.1); the nss path runs with tls_checkpeer no.
      - /share/Container/jc-ldap-proxy/certs:/certs:ro
    networks:
      - net-ldap-proxy
    tmpfs:
      # The root filesystem is read-only. Runtime config/PID files and cached
      # hashes live on size-limited tmpfs mounts owned by the configured user.
      - /run/openldap:rw,size=16m,uid=${LDAP_PROXY_UID:-99},gid=${LDAP_PROXY_GID:-100},mode=0700
      - /var/lib/ldap/pcache:rw,size=256m,uid=${LDAP_PROXY_UID:-99},gid=${LDAP_PROXY_GID:-100},mode=0700

networks:
  net-ldap-proxy:
    # Explicit name so Docker uses it verbatim instead of prefixing the
    # compose project name.
    name: net-ldap-proxy
    driver: bridge
    # Pinned exactly to the subnet allowed by the slapd peername ACL.
    ipam:
      config:
        - subnet: 172.28.53.0/24
